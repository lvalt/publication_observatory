<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI-DOC Publication Observatory</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--navy:#001930;--teal:#2c6b86;--mid:#0b3c56;--white:#fefefe;--pure:#ffffff;--teal-light:#3a8ba8;--accent:#4ecdc4;--warn:#f7b731;--err:#eb4d4b;--text:#e0eef3;--text-dim:#7ca3b5;--text-muted:#4a7080;--card-bg:rgba(11,60,86,0.6);--card-border:rgba(44,107,134,0.3);--surface:rgba(0,25,48,0.95)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Outfit',sans-serif;background:var(--navy);color:var(--text);min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 0%,rgba(44,107,134,0.12) 0%,transparent 60%),radial-gradient(ellipse at 80% 100%,rgba(11,60,86,0.15) 0%,transparent 50%);pointer-events:none;z-index:0}
.app{max-width:1320px;margin:0 auto;padding:28px 24px;position:relative;z-index:1}
.header{margin-bottom:28px}
.header h1{font-size:32px;font-weight:800;color:var(--white);letter-spacing:-0.03em}
.header h1 span{color:var(--accent)}
.header .sub{color:var(--text-dim);font-size:14px;margin-top:6px}
.header .sub .mono{font-family:'JetBrains Mono',monospace;font-size:11px;background:var(--card-bg);padding:2px 8px;border-radius:4px;border:1px solid var(--card-border)}
.tabs{display:flex;gap:4px;margin-bottom:24px;background:var(--card-bg);border-radius:12px;padding:4px;border:1px solid var(--card-border);width:fit-content}
.tab{padding:10px 22px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;color:var(--text-dim);background:transparent;border:none;font-family:'Outfit',sans-serif}
.tab:hover{color:var(--text)}
.tab.active{background:var(--teal);color:var(--white);box-shadow:0 2px 8px rgba(44,107,134,0.4)}
.card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:14px;padding:24px;margin-bottom:20px;backdrop-filter:blur(10px)}
.card-title{font-size:14px;font-weight:700;color:var(--white);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.stats-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:24px}
.stat-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:12px;padding:16px 20px;text-align:center;flex:1 1 120px;min-width:120px;transition:border-color 0.2s}
.stat-card:hover{border-color:var(--teal)}
.stat-value{font-size:28px;font-weight:700;color:var(--white);line-height:1.1;font-family:'JetBrains Mono',monospace}
.stat-label{font-size:11px;color:var(--text-dim);margin-top:4px;font-weight:500;text-transform:uppercase;letter-spacing:0.06em}
.stat-sub{font-size:10px;color:var(--text-muted);margin-top:2px}
.charts-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;margin-bottom:24px}
.chart-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:14px;padding:20px;display:flex;flex-direction:column;align-items:center}
.chart-title{font-size:12px;font-weight:600;color:var(--text-dim);letter-spacing:0.04em;margin-bottom:12px;text-transform:uppercase}
.legend{display:flex;flex-wrap:wrap;justify-content:center;gap:4px 12px;margin-top:10px}
.legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text-dim)}
.legend-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;width:100%}
.bar-label{width:52px;text-align:right;font-size:11px;font-weight:600;font-family:'JetBrains Mono',monospace;color:var(--text-dim)}
.bar-track{flex:1;background:rgba(44,107,134,0.15);border-radius:4px;height:22px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width 0.8s ease}
.bar-count{width:28px;font-size:11px;font-weight:600;font-family:'JetBrains Mono',monospace;color:var(--text-dim)}
.table-wrap{border:1px solid var(--card-border);border-radius:14px;overflow:hidden;background:var(--card-bg)}
.table-scroll{overflow-x:auto;max-height:65vh;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{padding:10px 12px;text-align:left;cursor:pointer;border-bottom:1px solid var(--card-border);background:rgba(0,25,48,0.8);font-size:10px;font-weight:600;color:var(--text-dim);letter-spacing:0.06em;text-transform:uppercase;position:sticky;top:0;z-index:1;white-space:nowrap;user-select:none}
thead th:hover{color:var(--accent)}
tbody td{padding:8px 12px;border-bottom:1px solid rgba(44,107,134,0.1)}
tbody tr:hover{background:rgba(44,107,134,0.08)}
.cell-author{font-weight:500;color:var(--white);white-space:nowrap}
.cell-title a{color:var(--accent);text-decoration:none}
.cell-title a:hover{text-decoration:underline}
.cell-mono{font-family:'JetBrains Mono',monospace;color:var(--text-dim);text-align:center;font-size:11px}
.badge{display:inline-block;padding:2px 8px;border-radius:5px;font-size:10px;font-weight:600;font-family:'JetBrains Mono',monospace;letter-spacing:0.03em}
.bq1{background:rgba(78,205,196,0.2);color:#4ecdc4;border:1px solid rgba(78,205,196,0.3)}
.bq2{background:rgba(44,107,134,0.3);color:#6bbcd4;border:1px solid rgba(44,107,134,0.4)}
.bq3{background:rgba(247,183,49,0.2);color:#f7b731;border:1px solid rgba(247,183,49,0.3)}
.bq4{background:rgba(235,77,75,0.2);color:#eb4d4b;border:1px solid rgba(235,77,75,0.3)}
.bna{background:rgba(122,163,181,0.1);color:var(--text-muted);border:1px solid rgba(122,163,181,0.15)}
.upload-area{background:var(--card-bg);border:2px dashed var(--card-border);border-radius:12px;padding:16px 24px;display:flex;align-items:center;gap:16px;margin-bottom:20px;transition:all 0.2s}
.upload-area:hover{border-color:var(--teal)}
.upload-area.loaded{border-color:var(--accent);border-style:solid}
.upload-area input[type="file"]{font-size:11px;font-family:'Outfit',sans-serif;color:var(--text-dim)}
.btn{padding:10px 22px;border-radius:10px;font-size:13px;font-weight:600;font-family:'Outfit',sans-serif;cursor:pointer;border:2px solid transparent;transition:all 0.15s}
.btn:hover{transform:translateY(-1px)}
.btn-accent{background:var(--accent);color:var(--navy);border-color:var(--accent);font-weight:700}
.btn-accent:hover{background:#5fe0d7}
.hidden{display:none}
.center{text-align:center}
.mt-16{margin-top:16px}
.mb-16{margin-bottom:16px}
/* History stacked area chart */
.history-scroll{overflow-x:auto;padding-bottom:8px}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>AI-DOC Publication <span>Observatory</span></h1>
    <div class="sub" id="subtitleText">PhD researcher publications — SCImago · JUFO · Google Scholar rankings</div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('dashboard')">📊 Dashboard</button>
    <button class="tab" onclick="showTab('history')">📈 Progress</button>
    <button class="tab" onclick="showTab('table')">📋 Publications</button>
  </div>

  <!-- Upload (for replacing data with newer file) -->
  <div class="upload-area" id="uploadArea">
    <span style="font-size:13px;color:var(--text-dim)" id="uploadLabel">Update data: upload a newer papers_with_rankings.xlsx →</span>
    <input type="file" id="fileInput" accept=".xlsx,.xls">
  </div>

  <!-- TAB: Dashboard -->
  <div id="tab-dashboard">
    <div class="stats-row" id="statsRow"></div>
    <div class="charts-grid" id="chartsGrid"></div>
    <div class="center mt-16">
      <button class="btn btn-accent" onclick="downloadExcel()">📥 Download papers_with_rankings.xlsx</button>
    </div>
  </div>

  <!-- TAB: History -->
  <div id="tab-history" class="hidden">
    <div class="card">
      <div class="card-title">📈 Publication Progress Over Time</div>
      <div id="historyContent"></div>
    </div>
  </div>

  <!-- TAB: Publications Table -->
  <div id="tab-table" class="hidden">
    <div class="card">
      <div class="card-title">📋 All Publications</div>
      <div class="table-wrap"><div class="table-scroll"><table><thead id="tableHead"></thead><tbody id="tableBody"></tbody></table></div></div>
    </div>
    <div class="center mt-16">
      <button class="btn btn-accent" onclick="downloadExcel()">📥 Download papers_with_rankings.xlsx</button>
    </div>
  </div>
</div>

<script>
/*EMBEDDED_DATA_MARKER*/

const Q_COL={Q1:"#4ecdc4",Q2:"#3a8ba8",Q3:"#f7b731",Q4:"#eb4d4b","N/A":"#4a7080"};
const J_COL={"3":"#4ecdc4","2":"#3a8ba8","1":"#f7b731","0":"#eb4d4b","N/A":"#4a7080"};
const H5_COL={"200+":"#4ecdc4","100–199":"#3a8ba8","50–99":"#f7b731","1–49":"#eb4d4b","N/A":"#4a7080"};

let papers=[],history=[];
let sortCol="author_name",sortAsc=true;

window.addEventListener("DOMContentLoaded",()=>{
  if(typeof EMBEDDED_PAPERS!=="undefined")papers=EMBEDDED_PAPERS;
  if(typeof EMBEDDED_HISTORY!=="undefined")history=EMBEDDED_HISTORY;
  if(typeof EMBEDDED_DATE!=="undefined"&&typeof EMBEDDED_SOURCE!=="undefined"){
    document.getElementById("uploadLabel").textContent=`Data from ${EMBEDDED_SOURCE} (${EMBEDDED_DATE}) — upload newer file to update`;
  }
  if(papers.length)render();
});

document.getElementById("fileInput").addEventListener("change",async function(e){
  const f=e.target.files[0];if(!f)return;
  const wb=XLSX.read(new Uint8Array(await f.arrayBuffer()),{type:"array"});
  papers=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:""});
  papers.forEach(p=>{Object.keys(p).forEach(k=>{if(p[k]==="NaN"||p[k]==="nan")p[k]=""})});
  document.getElementById("uploadArea").classList.add("loaded");
  document.getElementById("uploadLabel").textContent=`✓ Loaded ${papers.length} papers from ${f.name}`;
  render();
});

function showTab(t){["dashboard","history","table"].forEach(n=>{document.getElementById("tab-"+n).classList.toggle("hidden",n!==t)});
  document.querySelectorAll(".tab").forEach((el,i)=>{el.classList.toggle("active",["dashboard","history","table"][i]===t)});
  if(t==="history")renderHistory();if(t==="table")renderTable();}

function render(){
  const yrs=papers.map(p=>p.year).filter(y=>y&&y!=="");
  if(yrs.length){const mn=Math.min(...yrs.map(Number)),mx=Math.max(...yrs.map(Number));
    document.getElementById("subtitleText").innerHTML=`${papers.length} papers (${mn===mx?mn:mn+"–"+mx}) · ${new Set(papers.map(p=>p.author_name)).size} authors — SCImago · JUFO · Google Scholar`;}
  renderStats();renderCharts();
}

function countBy(a,k){const c={};a.forEach(d=>{const v=d[k]!=null&&d[k]!==""?String(d[k]):"N/A";c[v]=(c[v]||0)+1});return c;}
function avg(a){return a.length?a.reduce((x,y)=>x+y,0)/a.length:null;}
function med(a){if(!a.length)return null;const s=[...a].sort((x,y)=>x-y),m=Math.floor(s.length/2);return s.length%2?s[m]:(s[m-1]+s[m])/2;}
function fmt(v,d){return v!=null?Number(v).toFixed(d):"—";}
function esc(s){const d=document.createElement("div");d.textContent=s||"";return d.innerHTML;}

function renderStats(){
  const sjrs=papers.filter(p=>p.scimago_sjr!=null&&p.scimago_sjr!==""&&!isNaN(p.scimago_sjr)).map(p=>Number(p.scimago_sjr));
  const jufos=papers.filter(p=>p.jufo_level!=null&&p.jufo_level!==""&&!isNaN(p.jufo_level)).map(p=>Number(p.jufo_level));
  const h5s=papers.filter(p=>p.gs_h5_index!=null&&p.gs_h5_index!==""&&!isNaN(p.gs_h5_index)).map(p=>Number(p.gs_h5_index));
  const qC=countBy(papers,"scimago_quartile"),jC=countBy(papers,"jufo_level");
  const au=new Set(papers.map(p=>p.author_name)).size;
  document.getElementById("statsRow").innerHTML=[
    sc(papers.length,"Papers",`${au} authors`),sc(fmt(avg(sjrs),2),"Mean SJR",`med ${fmt(med(sjrs),2)}`),
    sc(fmt(avg(jufos),1),"Mean JUFO",`med ${fmt(med(jufos),1)}`),sc(fmt(avg(h5s),0),"Mean h5",`med ${fmt(med(h5s),0)}`),
    sc(qC["Q1"]||0,"Q1 Papers","SCImago"),sc(jC["3"]||0,"JUFO 3","top level"),
  ].join("");
}
function sc(v,l,s){return`<div class="stat-card"><div class="stat-value">${v}</div><div class="stat-label">${l}</div><div class="stat-sub">${s}</div></div>`;}

function renderCharts(){
  const qC=countBy(papers,"scimago_quartile"),jC=countBy(papers,"jufo_level");
  const h5B={"200+":0,"100–199":0,"50–99":0,"1–49":0,"N/A":0};
  papers.forEach(p=>{const v=p.gs_h5_index;if(v==null||v===""||isNaN(v))h5B["N/A"]++;else if(Number(v)>=200)h5B["200+"]++;else if(Number(v)>=100)h5B["100–199"]++;else if(Number(v)>=50)h5B["50–99"]++;else h5B["1–49"]++;});
  document.getElementById("chartsGrid").innerHTML=
    donut("SCImago Quartile",qC,Q_COL)+donut("JUFO Level",jC,J_COL)+donut("GS h5-index",h5B,H5_COL)+
    bars("By SCImago Q",qC,Q_COL,["Q1","Q2","Q3","Q4","N/A"])+bars("By JUFO Level",jC,J_COL,["3","2","1","0","N/A"])+bars("By h5-index",h5B,H5_COL,["200+","100–199","50–99","1–49","N/A"]);
}

function donut(title,data,colors){
  const total=Object.values(data).reduce((a,b)=>a+b,0);if(!total)return"";
  const sz=150,cx=75,cy=75,r=52,sw=22;let cum=-90,paths="",leg="";
  for(const[l,c]of Object.entries(data)){if(!c)continue;const ang=(c/total)*360,s=(cum*Math.PI)/180,e=((cum+ang)*Math.PI)/180;
    const x1=cx+r*Math.cos(s),y1=cy+r*Math.sin(s),x2=cx+r*Math.cos(e),y2=cy+r*Math.sin(e),la=ang>180?1:0,co=colors[l]||"#4a7080";
    paths+=`<path d="M ${x1} ${y1} A ${r} ${r} 0 ${la} 1 ${x2} ${y2}" fill="none" stroke="${co}" stroke-width="${sw}"/>`;
    leg+=`<div class="legend-item"><span class="legend-dot" style="background:${co}"></span>${l}: ${c}</div>`;cum+=ang;}
  return`<div class="chart-card"><div class="chart-title">${title}</div><svg width="${sz}" height="${sz}" viewBox="0 0 ${sz} ${sz}">${paths}<text x="${cx}" y="${cy-4}" text-anchor="middle" fill="var(--white)" font-family="'JetBrains Mono'" font-weight="700" font-size="22">${total}</text><text x="${cx}" y="${cy+12}" text-anchor="middle" fill="var(--text-muted)" font-family="'Outfit'" font-size="10">papers</text></svg><div class="legend">${leg}</div></div>`;
}

function bars(title,data,colors,order){
  const entries=order.filter(k=>data[k]).map(k=>[k,data[k]]);const mx=Math.max(...entries.map(e=>e[1]),1);let h="";
  for(const[l,c]of entries){const co=colors[l]||"#4a7080";h+=`<div class="bar-row"><div class="bar-label">${l}</div><div class="bar-track"><div class="bar-fill" style="width:${(c/mx)*100}%;background:${co}"></div></div><div class="bar-count">${c}</div></div>`;}
  return`<div class="chart-card" style="align-items:stretch"><div class="chart-title">${title}</div>${h}</div>`;
}

// ═══ Table ═══
function renderTable(){
  const cols=[{k:"author_name",l:"Author",w:"140px"},{k:"title",l:"Title"},{k:"year",l:"Year",w:"55px"},{k:"venue",l:"Venue"},{k:"scimago_quartile",l:"SJR Q",w:"55px"},{k:"scimago_sjr",l:"SJR",w:"52px"},{k:"jufo_level",l:"JUFO",w:"65px"},{k:"gs_h5_index",l:"h5",w:"52px"}];
  document.getElementById("tableHead").innerHTML="<tr>"+cols.map(c=>`<th style="width:${c.w||'auto'}" onclick="doSort('${c.k}')">${c.l} ${sortCol===c.k?(sortAsc?'↑':'↓'):''}</th>`).join("")+"</tr>";
  const sorted=[...papers].sort((a,b)=>{let av=a[sortCol],bv=b[sortCol];if(av==null||av==="")av=sortAsc?"\uffff":"";if(bv==null||bv==="")bv=sortAsc?"\uffff":"";if(typeof av==="number"&&typeof bv==="number")return sortAsc?av-bv:bv-av;return sortAsc?String(av).localeCompare(String(bv)):String(bv).localeCompare(String(av));});
  document.getElementById("tableBody").innerHTML=sorted.map(p=>{
    const tc=p.doi?`<a href="https://doi.org/${p.doi}" target="_blank">${esc(p.title)}</a>`:esc(p.title||"");
    const qc=({Q1:"bq1",Q2:"bq2",Q3:"bq3",Q4:"bq4"})[p.scimago_quartile]||"bna";
    const jc=p.jufo_level!=null&&p.jufo_level!==""?({"3":"bq1","2":"bq2","1":"bq3","0":"bq4"}[String(p.jufo_level)]||"bna"):"bna";
    const h5c=p.gs_h5_index!=null&&p.gs_h5_index!==""?(Number(p.gs_h5_index)>=200?"bq1":Number(p.gs_h5_index)>=100?"bq2":Number(p.gs_h5_index)>=50?"bq3":"bq4"):"bna";
    return`<tr><td class="cell-author">${esc(p.author_name)}</td><td class="cell-title">${tc}</td><td class="cell-mono">${p.year||""}</td><td style="font-size:11px;color:var(--text-dim)">${esc(p.venue||"")}</td><td style="text-align:center"><span class="badge ${qc}">${p.scimago_quartile||"—"}</span></td><td class="cell-mono">${p.scimago_sjr!=null&&p.scimago_sjr!==""?Number(p.scimago_sjr).toFixed(2):"—"}</td><td style="text-align:center"><span class="badge ${jc}">${p.jufo_level!=null&&p.jufo_level!==""?"J"+p.jufo_level:"—"}</span></td><td style="text-align:center"><span class="badge ${h5c}">${p.gs_h5_index!=null&&p.gs_h5_index!==""?p.gs_h5_index:"—"}</span></td></tr>`;
  }).join("");
}
function doSort(c){if(sortCol===c)sortAsc=!sortAsc;else{sortCol=c;sortAsc=true;}renderTable();}

// ═══ History ═══
function renderHistory(){
  const el=document.getElementById("historyContent");
  if(!history.length){el.innerHTML=`<div style="text-align:center;color:var(--text-muted);padding:40px">No history snapshots yet.</div>`;return;}
  let html="";

  // ─── Stacked area: SCImago quartiles over time ───
  if(history.length>=2) html+=stackedChart("SCImago Quartile Progression",history,
    [{k:"q1",l:"Q1",c:"#4ecdc4"},{k:"q2",l:"Q2",c:"#3a8ba8"},{k:"q3",l:"Q3",c:"#f7b731"},{k:"q4",l:"Q4",c:"#eb4d4b"}]);

  // ─── Stacked area: JUFO levels over time ───
  if(history.length>=2) html+=stackedChart("JUFO Level Progression",history,
    [{k:"jufo3",l:"JUFO 3",c:"#4ecdc4"},{k:"jufo2",l:"JUFO 2",c:"#3a8ba8"},{k:"jufo1",l:"JUFO 1",c:"#f7b731"},{k:"jufo0",l:"JUFO 0",c:"#eb4d4b"}]);

  // ─── Line: Total papers + avg SJR ───
  if(history.length>=2) html+=lineChart("Total Papers & Avg SJR",history);

  // ─── History table ───
  html+=`<div class="mt-16" style="overflow-x:auto"><table><thead><tr><th>Date</th><th>Papers</th><th>Authors</th><th>Q1</th><th>Q2</th><th>Q3</th><th>Q4</th><th>J3</th><th>J2</th><th>J1</th><th>J0</th><th>Avg SJR</th></tr></thead><tbody>`;
  for(const h of[...history].reverse()){
    html+=`<tr><td class="cell-mono">${h.date}</td><td class="cell-mono">${h.total}</td><td class="cell-mono">${h.authors}</td>`;
    html+=`<td class="cell-mono">${h.q1||0}</td><td class="cell-mono">${h.q2||0}</td><td class="cell-mono">${h.q3||0}</td><td class="cell-mono">${h.q4||0}</td>`;
    html+=`<td class="cell-mono">${h.jufo3||0}</td><td class="cell-mono">${h.jufo2||0}</td><td class="cell-mono">${h.jufo1||0}</td><td class="cell-mono">${h.jufo0||0}</td>`;
    html+=`<td class="cell-mono">${h.avg_sjr||"—"}</td></tr>`;
  }
  html+=`</tbody></table></div>`;
  el.innerHTML=html;
}

function stackedChart(title,hist,series){
  const w=Math.max(600,hist.length*90),h=240,pad=50,padR=20,padT=20,padB=44;
  const pw=w-pad-padR,ph=h-padT-padB;
  // Compute stacked totals
  const maxStack=Math.max(...hist.map(snap=>series.reduce((s,sr)=>s+(snap[sr.k]||0),0)),1);
  let svg=`<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="display:block">`;
  // Grid
  for(let i=0;i<=4;i++){const y=padT+ph*(i/4);const v=Math.round(maxStack*(1-i/4));
    svg+=`<line x1="${pad}" y1="${y}" x2="${w-padR}" y2="${y}" stroke="var(--card-border)" stroke-dasharray="4,4"/>`;
    svg+=`<text x="${pad-8}" y="${y+4}" text-anchor="end" fill="var(--text-muted)" font-size="10" font-family="'JetBrains Mono'">${v}</text>`;}
  // X labels
  hist.forEach((snap,i)=>{const x=pad+(hist.length>1?i*(pw/(hist.length-1)):pw/2);
    svg+=`<text x="${x}" y="${h-6}" text-anchor="middle" fill="var(--text-muted)" font-size="9" font-family="'JetBrains Mono'" transform="rotate(-30 ${x} ${h-6})">${snap.date.slice(5)}</text>`;});
  // Stacked areas (bottom to top)
  for(let si=series.length-1;si>=0;si--){
    const pts=hist.map((snap,i)=>{
      const x=pad+(hist.length>1?i*(pw/(hist.length-1)):pw/2);
      let cumVal=0;for(let j=0;j<=si;j++)cumVal+=(snap[series[j].k]||0);
      const y=padT+ph-(cumVal/maxStack)*ph;
      return{x,y};
    });
    const basePts=hist.map((snap,i)=>{
      const x=pad+(hist.length>1?i*(pw/(hist.length-1)):pw/2);
      let cumVal=0;for(let j=0;j<si;j++)cumVal+=(snap[series[j].k]||0);
      const y=padT+ph-(cumVal/maxStack)*ph;
      return{x,y};
    });
    const pathD=pts.map((p,i)=>`${i?'L':'M'}${p.x},${p.y}`).join(" ")+basePts.reverse().map(p=>`L${p.x},${p.y}`).join(" ")+"Z";
    svg+=`<path d="${pathD}" fill="${series[si].c}" fill-opacity="0.5" stroke="${series[si].c}" stroke-width="1.5"/>`;
  }
  // Dots for top series
  hist.forEach((snap,i)=>{
    const x=pad+(hist.length>1?i*(pw/(hist.length-1)):pw/2);
    let cum=0;series.forEach(sr=>{cum+=(snap[sr.k]||0)});
    const y=padT+ph-(cum/maxStack)*ph;
    svg+=`<circle cx="${x}" cy="${y}" r="3" fill="var(--white)" stroke="var(--navy)" stroke-width="1.5"><title>Total ranked: ${cum}</title></circle>`;
  });
  svg+=`</svg>`;
  let leg=series.map(sr=>`<div class="legend-item"><span class="legend-dot" style="background:${sr.c}"></span>${sr.l}</div>`).join("");
  return`<div class="card mb-16"><div class="chart-title">${title}</div><div class="history-scroll">${svg}</div><div class="legend" style="margin-top:6px">${leg}</div></div>`;
}

function lineChart(title,hist){
  const w=Math.max(600,hist.length*90),h=200,pad=50,padR=40,padT=20,padB=44;
  const pw=w-pad-padR,ph=h-padT-padB;
  const maxP=Math.max(...hist.map(s=>s.total),1);
  const maxSJR=Math.max(...hist.filter(s=>s.avg_sjr).map(s=>Number(s.avg_sjr)),1);
  let svg=`<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="display:block">`;
  for(let i=0;i<=4;i++){const y=padT+ph*(i/4);const v=Math.round(maxP*(1-i/4));
    svg+=`<line x1="${pad}" y1="${y}" x2="${w-padR}" y2="${y}" stroke="var(--card-border)" stroke-dasharray="4,4"/>`;
    svg+=`<text x="${pad-8}" y="${y+4}" text-anchor="end" fill="var(--text-muted)" font-size="10" font-family="'JetBrains Mono'">${v}</text>`;}
  hist.forEach((snap,i)=>{const x=pad+(hist.length>1?i*(pw/(hist.length-1)):pw/2);
    svg+=`<text x="${x}" y="${h-6}" text-anchor="middle" fill="var(--text-muted)" font-size="9" font-family="'JetBrains Mono'" transform="rotate(-30 ${x} ${h-6})">${snap.date.slice(5)}</text>`;});
  // Total line
  const totalPts=hist.map((s,i)=>({x:pad+(hist.length>1?i*(pw/(hist.length-1)):pw/2),y:padT+ph-(s.total/maxP)*ph}));
  svg+=`<polyline fill="none" stroke="var(--white)" stroke-width="2.5" stroke-linejoin="round" points="${totalPts.map(p=>`${p.x},${p.y}`).join(" ")}"/>`;
  totalPts.forEach(p=>{svg+=`<circle cx="${p.x}" cy="${p.y}" r="3.5" fill="var(--white)" stroke="var(--navy)" stroke-width="2"/>`;});
  // SJR line (on right axis)
  const sjrPts=hist.filter(s=>s.avg_sjr).map((s,i)=>{
    const idx=hist.indexOf(s);return{x:pad+(hist.length>1?idx*(pw/(hist.length-1)):pw/2),y:padT+ph-(Number(s.avg_sjr)/maxSJR)*ph};});
  if(sjrPts.length>=2){
    svg+=`<polyline fill="none" stroke="var(--accent)" stroke-width="2" stroke-dasharray="6,4" stroke-linejoin="round" points="${sjrPts.map(p=>`${p.x},${p.y}`).join(" ")}"/>`;
    sjrPts.forEach(p=>{svg+=`<circle cx="${p.x}" cy="${p.y}" r="3" fill="var(--accent)" stroke="var(--navy)" stroke-width="1.5"/>`;});
    // Right axis labels for SJR
    for(let i=0;i<=2;i++){const y=padT+ph*(i/2);const v=(maxSJR*(1-i/2)).toFixed(1);
      svg+=`<text x="${w-padR+8}" y="${y+4}" text-anchor="start" fill="var(--accent)" font-size="9" font-family="'JetBrains Mono'">${v}</text>`;}
  }
  svg+=`</svg>`;
  return`<div class="card mb-16"><div class="chart-title">${title}</div><div class="history-scroll">${svg}</div><div class="legend" style="margin-top:6px"><div class="legend-item"><span class="legend-dot" style="background:var(--white)"></span>Total papers</div><div class="legend-item"><span class="legend-dot" style="background:var(--accent)"></span>Avg SJR (right axis)</div></div></div>`;
}

// ═══ Export ═══
function downloadExcel(){
  if(!papers.length){alert("No data");return;}
  const today=new Date().toISOString().slice(0,10);
  const cols=["author_name","author_id","title","year","publicationDate","venue","venue_issn","doi","scimago_quartile","scimago_sjr","jufo_level","gs_h5_index","gs_h5_median","paper_id"];
  const rows=papers.map(p=>{const r={};cols.forEach(c=>{r[c]=p[c]!==undefined?p[c]:""});return r;});
  const ws=XLSX.utils.json_to_sheet(rows);ws["!cols"]=cols.map(c=>({wch:Math.min(Math.max(c.length+2,12),50)}));
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,"Papers");
  XLSX.writeFile(wb,`papers_with_rankings_${today}.xlsx`);
}
